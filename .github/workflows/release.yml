name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: onshape-cli
          - os: macos-13
            target: x86_64-apple-darwin
            bin: onshape-cli
          - os: macos-14
            target: aarch64-apple-darwin
            bin: onshape-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: onshape-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          ASSET="onshape-cli-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          tar -C dist -czf "${ASSET}.tar.gz" "${{ matrix.bin }}"
          echo "ASSET_FILE=${ASSET}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "onshape-cli-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath "$asset.zip" -Force
          "ASSET_FILE=$asset.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_FILE }}
          path: ${{ env.ASSET_FILE }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
